  .header { display:flex; align-items:center; justify-content:space-between; padding:22px 32px 18px; border-bottom:1px solid var(--border); }

  .last-update { font-family:var(--mono); font-size:11px; color:var(--muted); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--up); box-shadow:0 0 6px var(--up); animation:pulse 2s ease-in-out infinite; }
  .status-dot.error   { background:var(--dn); box-shadow:0 0 6px var(--dn); animation:none; }
  .status-dot.loading { background:var(--muted); box-shadow:none; animation:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .toolbar { display:flex; align-items:center; justify-content:space-between; padding:14px 32px; gap:12px; flex-wrap:wrap; }
  .period-group { display:flex; gap:4px; flex-wrap:wrap; }
  .pbtn { font-family:var(--mono); font-size:12px; padding:5px 11px; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--muted); cursor:pointer; transition:all 0.15s; }

  .pbtn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .stock-count { font-family:var(--mono); font-size:12px; color:var(--muted); }

  .notice { margin:0 32px 14px; padding:10px 14px; background:rgba(79,142,247,0.08); border:1px solid rgba(79,142,247,0.2); border-radius:8px; font-size:12px; color:#7aabf7; font-family:var(--mono); }
  .error-banner { margin:0 32px 14px; padding:12px 14px; background:var(--dn-bg); border:1px solid rgba(240,84,79,0.25); border-radius:8px; font-size:12px; color:var(--dn); font-family:var(--mono); display:none; }

  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; padding:0 32px 24px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; position:relative; transition:border-color 0.2s,transform 0.15s; display:flex; flex-direction:column; }
  .card:hover { border-color:var(--border2); transform:translateY(-1px); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .ticker { font-family:var(--mono); font-size:16px; font-weight:500; letter-spacing:-0.3px; }
  .co-name { font-size:11px; color:var(--muted); max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .badge { font-family:var(--mono); font-size:12px; font-weight:500; padding:3px 8px; border-radius:6px; white-space:nowrap; }

  .badge.dn   { background:var(--dn-bg); color:var(--dn); }

  .price { font-family:var(--mono); font-size:26px; font-weight:500; letter-spacing:-1px; margin-bottom:10px; line-height:1; }

  .stat-cell { background:var(--surface2); padding:9px 12px; display:flex; flex-direction:column; gap:3px; }

  .stat-value.pos { color:var(--up); }
  .stat-value.neg { color:var(--dn); }

  .spark-wrap.clicked::after { content:''; position:absolute; inset:0; border-radius:8px; border:2px solid var(--accent); animation:ripple 0.35s ease-out forwards; }

  }

/* ── Fetch via proxies ── */
async function fetchWithProxy(url){
  let lastErr='';
  for(const proxy of PROXIES){
    try{
      const res=await fetch(proxy(url),{signal:AbortSignal.timeout(9000)});
      if(!res.ok){lastErr='HTTP '+res.status;continue;}
      const text=await res.text();
      if(text&&text.length>20) return text;
    }catch(e){lastErr=e.message;}
  }
  throw new Error(lastErr||'All proxies failed');
}

/* ── CSV parser ── */
function parseCSV(raw){
  const lines=raw.trim().replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const out=[];
  for(const line of lines){
    if(!line.trim()) continue;
    const cols=[]; let cur='',inQ=false;
    for(let c=0;c<line.length;c++){
      if(line[c]==='"'){inQ=!inQ;}
      else if(line[c]===','&&!inQ){cols.push(cur);cur='';}
      else{cur+=line[c];}
    }
    cols.push(cur);
    const ticker=(cols[0]||'').trim().replace(/^"|"$/g,'').toUpperCase();
    if(!ticker||ticker==='TICKER'||ticker==='SYMBOL') continue;
    const price    =parseFloat((cols[1]||'').replace(/^"|"$/g,'').replace(/,/g,''));
    const changePct=parseFloat((cols[2]||'').replace(/^"|"$/g,'').replace(/,/g,''));
    if(!ticker||isNaN(price)||price<=0) continue;
    const n=cols.length;
    const peRaw =(cols[n-1]||'').trim().replace(/^"|"$/g,'');
    const epsRaw=(cols[n-2]||'').trim().replace(/^"|"$/g,'');
    const name  =n>5?cols.slice(3,n-2).join(',').trim().replace(/^"|"$/g,''):
                     (cols[3]||'').trim().replace(/^"|"$/g,'')||ticker;
    const eps=parseFloat(epsRaw.replace(/,/g,''));
    const peClean=peRaw.replace(/#/g,'').toUpperCase();
    const pe=(peClean===''||peClean==='N/A'||peClean==='NA')?null:parseFloat(peRaw.replace(/,/g,''));
    out.push({
      ticker,price,
      changePct:isNaN(changePct)?0:changePct,
      name:name||ticker,
      eps:isNaN(eps)?null:eps,
      pe:(pe===null||isNaN(pe))?null:pe
    });
  }
  return out;
}

/* ── Helpers ── */
function setStatus(s){document.getElementById('dot').className='status-dot'+(s==='error'?' error':s==='loading'?' loading':'');}
function showError(msg){const b=document.getElementById('err-banner');b.textContent='⚠ '+msg;b.style.display='block';}
function hideError(){document.getElementById('err-banner').style.display='none';}
function fmtPrice(p){return '$'+Number(p).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtEPS(v){if(v===null)return{text:'N/A',cls:'na'};return{text:(v>=0?'+':'')+v.toFixed(2),cls:v>=0?'pos':'neg'};}
function fmtPE(v) {if(v===null)return{text:'N/A',cls:'na'};return{text:v.toFixed(2)+'x',cls:''};}

function genSpark(ticker,price,changePct,period){
  const key=ticker+'|'+period.l;
  if(sparkCache.has(key)) return sparkCache.get(key);
  const pts=[]; let v=price/(1+(changePct||0)/100);
  for(let i=0;i<period.n;i++){v+=(Math.random()-0.48)*v*period.noise;pts.push(+v.toFixed(4));}
  pts.push(price); sparkCache.set(key,pts); return pts;
}

/* ── Period bar ── */

    b.onclick=()=>{curPeriod=p;sparkCache.clear();buildPeriodBar();renderPage();};
    bar.appendChild(b);
  });
}

    stocks.length?stocks.length+' stocks · page '+(curPage+1)+' of '+total:'';

  if(stocks.length===0){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">📈</div>
      <h3>No stocks loaded</h3><p>Click ↻ Refresh to try again</p></div>`;
    buildPager(); return;
  }

  stocks.slice(curPage*PER_PAGE,curPage*PER_PAGE+PER_PAGE).forEach(s=>{
    const isUp=s.changePct>0, isDn=s.changePct<0;
    const badgeCls=isUp?'up':isDn?'dn':'flat';
    const card=document.createElement('div'); card.className='card';
    const uid='c'+s.ticker.replace(/[^a-zA-Z0-9]/g,'_')+'_'+Math.random().toString(36).slice(2,6);
    const gnUrl=googleNewsUrl(s.name,s.ticker);
    const eps=fmtEPS(s.eps), pe=fmtPE(s.pe);
    const chgStr=s.changePct===0?'0.00%':(isUp?'+':'')+s.changePct.toFixed(2)+'%';
    const chgColor=isUp?'var(--up)':isDn?'var(--dn)':'var(--muted)';

    card.innerHTML=`
      <div class="card-top">
        <div><div class="ticker">${s.ticker}</div><div class="co-name" title="${s.name}">${s.name}</div></div>
        <span class="badge ${badgeCls}">${chgStr}</span>
      </div>
      <div class="price">${fmtPrice(s.price)}</div>
      <div class="spark-wrap" id="sw-${uid}" title="Click to open Google News for ${s.name}">
        <canvas id="${uid}"></canvas>
        <div class="news-hint">
          <div class="news-hint-icon">↗</div>
          <span class="news-hint-text">Google News</span>
        </div>
        <div class="tooltip-box" id="tip-${uid}">
          <div class="tooltip-price" id="tp-${uid}"></div>
          <div class="tooltip-label">trend (${curPeriod.l})</div>
          <div class="tooltip-row">Period move <span id="tpc-${uid}"></span></div>
          <div class="tooltip-row">Day change <span style="color:${chgColor}">${chgStr}</span></div>
        </div>
      </div>
      <div class="news-links">
        <a class="news-link-btn primary" href="${gnUrl}" target="_blank" rel="noopener">📰 Google News</a>
        <a class="news-link-btn" href="${yahooUrl(s.ticker)}" target="_blank" rel="noopener">Yahoo Finance</a>
        <a class="news-link-btn" href="${mwUrl(s.ticker)}" target="_blank" rel="noopener">MarketWatch</a>
      </div>
      <div class="card-stats">
        <div class="stat-cell">
          <div class="stat-label">EPS</div>
          <div class="stat-value ${eps.cls}">${eps.text}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">P/E Ratio</div>
          <div class="stat-value ${pe.cls}">${pe.text}</div>
        </div>
      </div>`;
    grid.appendChild(card);

    const sw=document.getElementById('sw-'+uid);
    sw.addEventListener('click',()=>{
      sw.classList.add('clicked');
      setTimeout(()=>sw.classList.remove('clicked'),400);
      window.open(gnUrl,'_blank','noopener');
    });

    requestAnimationFrame(()=>{
      const ctx=document.getElementById(uid); if(!ctx) return;
      const data=genSpark(s.ticker,s.price,s.changePct,curPeriod);
      const tipEl=document.getElementById('tip-'+uid);
      const tpEl =document.getElementById('tp-' +uid);
      const tpcEl=document.getElementById('tpc-'+uid);
      const color=isUp?'#34c77b':isDn?'#f0544f':'#4f8ef7';
      const bgClr=isUp?'rgba(52,199,123,0.08)':isDn?'rgba(240,84,79,0.08)':'rgba(79,142,247,0.08)';

      const chart=new Chart(ctx,{
        type:'line',
        data:{labels:data.map((_,i)=>i),datasets:[{
          data,borderColor:color,borderWidth:1.5,
          pointRadius:0,pointHoverRadius:3,pointHoverBackgroundColor:color,
          fill:true,backgroundColor:bgClr,tension:0.35
        }]},
        options:{
          responsive:false,maintainAspectRatio:false,animation:false,
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{display:false},
            tooltip:{enabled:false,external:({tooltip})=>{
              if(tooltip.opacity===0){tipEl.style.display='none';return;}
              const dp=tooltip.dataPoints?.[0]; if(!dp) return;
              const hv=dp.raw,pct=((hv-data[0])/data[0]*100),up=pct>=0;
              tpEl.textContent=fmtPrice(hv); tpEl.style.color=up?'#34c77b':'#f0544f';
              tpcEl.textContent=(up?'+':'')+pct.toFixed(2)+'%'; tpcEl.style.color=up?'#34c77b':'#f0544f';
              tipEl.style.display='block';
            }}
          },
          scales:{x:{display:false},y:{display:false}}
        }
      });
      activeCharts.push(chart);
      ctx.addEventListener('mouseleave',()=>{tipEl.style.display='none';});
    });
  });
  buildPager();
}

/* ── Pagination ── */
function buildPager(){
  const pg=document.getElementById('pager'); pg.innerHTML='';
  const total=Math.ceil(stocks.length/PER_PAGE); if(total<=1) return;
  const prev=document.createElement('button');
  prev.className='pg-btn';prev.textContent='← Prev';prev.disabled=curPage===0;
  prev.onclick=()=>{curPage--;renderPage();};pg.appendChild(prev);
  for(let i=0;i<total;i++){
    const b=document.createElement('button');
    b.className='pg-btn'+(i===curPage?' cur':'');b.textContent=i+1;
    b.onclick=(idx=>()=>{curPage=idx;renderPage();})(i);pg.appendChild(b);
  }
  const next=document.createElement('button');
  next.className='pg-btn';next.textContent='Next →';next.disabled=curPage>=total-1;
  next.onclick=()=>{curPage++;renderPage();};pg.appendChild(next);
  const info=document.createElement('span');info.className='pg-count';
  info.textContent=(curPage*PER_PAGE+1)+'–'+Math.min((curPage+1)*PER_PAGE,stocks.length)+' of '+stocks.length;
  pg.appendChild(info);
}

/* ── Main ── */
async function fetchAndRender(){
  setStatus('loading');
  document.getElementById('last-update').textContent='Fetching...';
  hideError();
  try{
    const text=await fetchWithProxy(SHEET_URL);
    const parsed=parseCSV(text);
    if(parsed.length===0) throw new Error('Parser returned 0 rows');
    stocks=parsed; sparkCache.clear(); setStatus('ok');
    document.getElementById('last-update').textContent=
      'Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    renderPage();
  }catch(e){
    if(stocks.length===0){stocks=FALLBACK;showError('Could not reach sheet ('+e.message+') — showing last known prices.');}
    else{showError('Refresh failed — showing previous data. Retrying in 60s.');}
    setStatus('error'); renderPage();
  }
}

buildPeriodBar();
fetchAndRender();
setInterval(fetchAndRender,60000);
</script>
</body>
