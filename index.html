<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Stock Watchlist</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;--surface3:#1f2330;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--muted:#6b7080;--accent:#4f8ef7;
  --up:#34c77b;--up-bg:rgba(52,199,123,0.12);
  --dn:#f0544f;--dn-bg:rgba(240,84,79,0.12);
  --radius:12px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:22px 32px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.logo{font-family:var(--mono);font-size:18px;font-weight:500;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.subtitle{font-size:12px;color:var(--muted);letter-spacing:0.5px;margin-top:3px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hbtn{font-family:var(--mono);font-size:12px;padding:7px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.hbtn:hover{color:var(--text);border-color:rgba(255,255,255,0.25)}
.hbtn.accent{background:rgba(79,142,247,0.15);border-color:rgba(79,142,247,0.4);color:var(--accent)}
.hbtn.accent:hover{background:rgba(79,142,247,0.25)}
.last-update{font-family:var(--mono);font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);animation:pulse 2s ease-in-out infinite;display:inline-block}
.dot.loading{background:var(--muted);box-shadow:none;animation:none}
.dot.error{background:var(--dn);box-shadow:0 0 6px var(--dn);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* Update panel */
.upanel{margin:0 32px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;display:none}
.upanel.open{display:block}
.upanel-head{padding:14px 18px 0;display:flex;justify-content:space-between;align-items:center}
.upanel-title{font-family:var(--mono);font-size:13px;color:var(--text)}
.upanel-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1}
.upanel-close:hover{color:var(--dn)}
.upanel-steps{padding:10px 18px 4px;font-size:12px;color:var(--muted);line-height:1.8}
.upanel-steps b{color:var(--text)}
.upanel-ta{width:100%;height:140px;background:var(--bg);border:none;border-top:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:12px 18px;resize:vertical;outline:none}
.upanel-ta::placeholder{color:var(--muted)}
.upanel-foot{padding:10px 18px 14px;display:flex;gap:8px;align-items:center}
.apply-btn{font-family:var(--mono);font-size:12px;padding:7px 18px;background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer}
.apply-btn:hover{opacity:0.85}
.umsg{font-family:var(--mono);font-size:11px}
.umsg.ok{color:var(--up)}.umsg.err{color:var(--dn)}
/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;gap:12px;flex-wrap:wrap}
.pgroup{display:flex;gap:4px;flex-wrap:wrap}
.pbtn{font-family:var(--mono);font-size:12px;padding:5px 11px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.pbtn:hover{color:var(--text);border-color:var(--border2)}
.pbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.scount{font-family:var(--mono);font-size:12px;color:var(--muted)}
.notice{margin:0 32px 14px;padding:10px 14px;background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);border-radius:8px;font-size:12px;color:#7aabf7;font-family:var(--mono)}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:0 32px 24px}
/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color 0.2s,transform 0.15s;display:flex;flex-direction:column}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.sig-buy{border-color:rgba(52,199,123,0.4);box-shadow:0 0 12px rgba(52,199,123,0.08)}
.card.sig-sell{border-color:rgba(240,84,79,0.4);box-shadow:0 0 12px rgba(240,84,79,0.08)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-top-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.card-top-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:8px}
.ticker{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:-0.3px}
.coname{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.chgbadge{font-family:var(--mono);font-size:12px;font-weight:500;padding:3px 8px;border-radius:6px;white-space:nowrap}
.chgbadge.up{background:var(--up-bg);color:var(--up)}
.chgbadge.dn{background:var(--dn-bg);color:var(--dn)}
.chgbadge.flat{background:var(--surface2);color:var(--muted)}
/* Signal badge */
.sigbadge{font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px;letter-spacing:0.5px;white-space:nowrap}
.sigbadge.buy{background:var(--up-bg);color:var(--up);border:1px solid rgba(52,199,123,0.3)}
.sigbadge.sell{background:var(--dn-bg);color:var(--dn);border:1px solid rgba(240,84,79,0.3)}
.sigbadge.hold{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.sigbadge.loading{background:var(--surface2);color:var(--muted);border:1px solid var(--border);opacity:0.6}
.price{font-family:var(--mono);font-size:26px;font-weight:500;letter-spacing:-1px;margin-bottom:10px;line-height:1}
/* Spark */
.spark-wrap{position:relative;width:100%;height:60px;margin-bottom:10px;cursor:pointer;border-radius:8px;transition:background 0.15s;border:1px solid transparent}
.spark-wrap:hover{background:rgba(79,142,247,0.06);border-color:rgba(79,142,247,0.15)}
.spark-wrap canvas{width:100%!important;height:60px!important;display:block}
.news-hint{position:absolute;inset:0;border-radius:8px;display:flex;align-items:center;justify-content:center;gap:6px;opacity:0;transition:opacity 0.18s;pointer-events:none;background:rgba(13,15,20,0.55);backdrop-filter:blur(2px)}
.spark-wrap:hover .news-hint{opacity:1}
.news-hint span{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:#fff;text-transform:uppercase}
.news-hint-icon{width:22px;height:22px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px}
/* Price tooltip */
.tipbox{position:absolute;top:-6px;left:50%;transform:translateX(-50%) translateY(-100%);background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:12px;pointer-events:none;white-space:nowrap;display:none;z-index:20;min-width:160px}
.tipbox .tp{font-size:14px;font-weight:500;margin-bottom:2px}
.tipbox .tl{font-size:11px;color:var(--muted);margin-bottom:5px}
.tipbox .tr{display:flex;justify-content:space-between;gap:16px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:5px;margin-top:4px}
.tipbox .tr span{color:var(--text)}
/* Signal detail */
.sigdetail{margin-bottom:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);display:none;font-size:11px}
.sigdetail.show{display:block}
.sigdetail-title{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.sigrow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)}
.sigrow:last-child{border-bottom:none}
.sigrow-lbl{color:var(--muted);font-family:var(--mono);font-size:11px}
.sigrow-val{font-family:var(--mono);font-size:11px;font-weight:500}
.sigrow-val.pos{color:var(--up)}.sigrow-val.neg{color:var(--dn)}.sigrow-val.neu{color:var(--muted)}
/* News links */
.nlinks{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.nlbtn{font-family:var(--mono);font-size:10px;padding:3px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);text-decoration:none;transition:all 0.15s;display:inline-flex;align-items:center;gap:3px}
.nlbtn:hover{color:var(--text);border-color:var(--border2)}
.nlbtn.primary{color:var(--accent);border-color:rgba(79,142,247,0.3)}
.nlbtn.primary:hover{background:rgba(79,142,247,0.08)}
/* Stats */
.stats{margin-top:auto;display:grid;grid-template-columns:1fr 1fr;gap:1px;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--border)}
.stat{background:var(--surface2);padding:9px 12px;display:flex;flex-direction:column;gap:3px}
.stat-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.stat-val{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text)}
.stat-val.pos{color:var(--up)}.stat-val.neg{color:var(--dn)}.stat-val.na{color:var(--muted);font-size:11px}
/* Empty */
.empty{grid-column:1/-1;text-align:center;padding:64px 32px;border:1px dashed var(--border2);border-radius:var(--radius)}
.empty-icon{font-size:36px;margin-bottom:16px}
.empty h3{font-size:15px;font-weight:400;color:var(--muted);margin-bottom:6px}
.empty p{font-size:12px;color:var(--muted);opacity:0.6}
/* Pagination */
.pager{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 32px 28px;flex-wrap:wrap}
.pgbtn{font-family:var(--mono);font-size:12px;padding:6px 13px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.pgbtn:hover:not(:disabled){color:var(--text);border-color:var(--border2)}
.pgbtn:disabled{opacity:0.3;cursor:default}
.pgbtn.cur{background:var(--accent);color:#fff;border-color:var(--accent)}
.pgcount{font-family:var(--mono);font-size:11px;color:var(--muted);margin:0 6px}
@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);padding:0 16px 20px}
  .header,.toolbar,.pager,.notice,.upanel{padding-left:16px;padding-right:16px}
  .upanel{margin-left:16px;margin-right:16px}
}
@media(max-width:580px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">watch<span>list</span></div>
    <div class="subtitle">SMA · MACD · FUNDAMENTALS</div>
  </div>
  <div class="header-right">
    <span class="dot loading" id="dot"></span>
    <span class="last-update" id="lupdate">Loading…</span>
    <button class="hbtn accent" onclick="togglePanel()">⬆ Update prices</button>
  </div>
</div>

<div class="upanel" id="upanel">
  <div class="upanel-head">
    <span class="upanel-title">📋 Paste latest CSV to update prices</span>
    <button class="upanel-close" onclick="togglePanel()">×</button>
  </div>
  <div class="upanel-steps"><b>How:</b> Google Sheets → <b>File → Download → CSV</b> → open in Notepad → <b>Ctrl+A Ctrl+C</b> → paste below → Apply</div>
  <textarea class="upanel-ta" id="csv-ta" placeholder="Paste CSV here…"></textarea>
  <div class="upanel-foot">
    <button class="apply-btn" onclick="applyCSV()">Apply update</button>
    <span class="umsg" id="umsg"></span>
  </div>
</div>

<div class="toolbar">
  <div class="pgroup" id="pbar"></div>
  <div class="scount" id="scount"></div>
</div>

<div class="notice">✦ Auto-refreshes every 30s · SMA + MACD + Fundamentals signals via Alpha Vantage · <b>click any chart</b> for Google News</div>
<div class="grid" id="grid"></div>
<div class="pager" id="pager"></div>

<script>
/* ─── CONFIG ─── */
var AV_KEY    = 'N5T1X5DHKNDLYPHM';
var SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhT0pc4LTvdblyIACdqJg9WGn2VWdEGMLPmIaKCQdFFOLVX-cfZiPFlNxiceVF4DwP73HbueJTqtq2/pub?gid=0&single=true&output=csv';
var PROXIES   = [
  function(u){return 'https://corsproxy.io/?'+encodeURIComponent(u);},
  function(u){return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u);},
  function(u){return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u);}
];
var PER_PAGE = 6;
var PERIODS  = [
  {l:'1D',n:48,noise:0.003},{l:'1W',n:35,noise:0.007},{l:'1M',n:30,noise:0.013},
  {l:'3M',n:90,noise:0.018},{l:'6M',n:126,noise:0.022},{l:'YTD',n:95,noise:0.020},
  {l:'1Y',n:252,noise:0.025},{l:'5Y',n:260,noise:0.030},{l:'10Y',n:520,noise:0.035}
];

/* ─── STATE ─── */
var stocks      = [];
var curPeriod   = PERIODS[0];
var curPage     = 0;
var sparkCache  = {};
var sigCache    = {};
var activeCharts= [];

/* ─── CSV PARSER ─── */
/* Format: Ticker,Price,Change%,Name,EPS,PE  (exactly 6 cols, no quotes) */
function parseCSV(raw) {
  var out   = [];
  /* strip BOM + all \r, split on \n */
  var lines = raw.replace(/^\uFEFF/, '').replace(/\r/g, '').trim().split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cols = line.split(',');
    /* Need at least 6 columns */
    if (cols.length < 6) continue;
    var ticker = cols[0].trim().toUpperCase();
    /* Skip header row — ticker column will be "TICKER" or not purely alpha */
    if (!ticker || ticker === 'TICKER' || ticker === 'SYMBOL') continue;
    /* col1=Price, col2=Change%, col3=Name, col[-2]=EPS, col[-1]=PE */
    /* Name may contain commas so join middle columns */
    var n      = cols.length;
    var price  = parseFloat(cols[1].trim());
    var chg    = parseFloat(cols[2].trim());
    var name   = cols.slice(3, n - 2).join(',').trim();
    if (!name) name = cols[3] ? cols[3].trim() : ticker;
    var epsStr = cols[n - 2].trim();
    var peStr  = cols[n - 1].trim();
    if (isNaN(price) || price <= 0) continue;
    var eps = parseFloat(epsStr);
    var peClean = peStr.replace(/#/g, '').toUpperCase();
    var pe  = (peClean === '' || peClean === 'N/A' || peClean === 'NA') ? null : parseFloat(peStr);
    out.push({
      ticker    : ticker,
      price     : price,
      changePct : isNaN(chg) ? 0 : chg,
      name      : name || ticker,
      eps       : isNaN(eps) ? null : eps,
      pe        : (pe === null || isNaN(pe)) ? null : pe
    });
  }
  return out;
}

/* ─── FETCH ─── */
function fetchURL(url) {
  /* Try direct first (works on GitHub Pages), then proxies */
  var attempts = [url].concat(PROXIES.map(function(p){return p(url);}));
  var i = 0;
  function next() {
    if (i >= attempts.length) return Promise.reject(new Error('All failed'));
    return fetch(attempts[i++]).then(function(r){
      if (!r.ok) return next();
      return r.text().then(function(t){
        if (!t || t.length < 10) return next();
        return t;
      });
    }).catch(function(){ return next(); });
  }
  return next();
}

function fetchSheet() {
  return fetchURL(SHEET_URL).then(function(text){
    var parsed = parseCSV(text);
    return parsed.length > 0 ? parsed : null;
  }).catch(function(){ return null; });
}

/* ─── ALPHA VANTAGE ─── */
function fetchPrices(ticker) {
  var url = 'https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol='+ticker+'&outputsize=compact&apikey='+AV_KEY;
  return fetchURL(url).then(function(text){
    var json   = JSON.parse(text);
    var series = json['Time Series (Daily)'];
    if (!series) return null;
    var dates  = Object.keys(series).sort();
    return dates.map(function(d){ return parseFloat(series[d]['4. close']); });
  }).catch(function(){ return null; });
}

/* ─── TECHNICAL INDICATORS ─── */
function sma(arr, n) {
  if (arr.length < n) return null;
  var s = 0;
  for (var i = arr.length - n; i < arr.length; i++) s += arr[i];
  return s / n;
}

function emaArr(arr, n) {
  var res = new Array(arr.length).fill(null);
  if (arr.length < n) return res;
  var k = 2 / (n + 1), e = 0;
  for (var i = 0; i < n; i++) e += arr[i];
  e /= n;
  res[n - 1] = e;
  for (var i = n; i < arr.length; i++) {
    e = arr[i] * k + e * (1 - k);
    res[i] = e;
  }
  return res;
}

function computeSignal(prices, eps, pe) {
  if (!prices || prices.length < 50) {
    return {signal: null, reasons: [{label:'Data', val:'Insufficient history', cls:'neu'}], score: 0};
  }
  var n     = prices.length;
  var close = prices[n - 1];

  /* SMA */
  var sma50  = sma(prices, Math.min(50,  n));
  var sma200 = sma(prices, Math.min(200, n));
  var sma50y = sma(prices.slice(0,-1), Math.min(50,  n-1));
  var sma200y= sma(prices.slice(0,-1), Math.min(200, n-1));

  var goldenCross = sma50y && sma200y && sma50y <= sma200y && sma50 > sma200;
  var deathCross  = sma50y && sma200y && sma50y >= sma200y && sma50 < sma200;

  /* MACD */
  var ema12 = emaArr(prices, 12);
  var ema26 = emaArr(prices, 26);
  var macd  = prices.map(function(_,i){
    return (ema12[i] !== null && ema26[i] !== null) ? ema12[i] - ema26[i] : null;
  });
  var macdVals = macd.filter(function(v){ return v !== null; });
  var sig9     = emaArr(macdVals, 9);
  var si = 0;
  var sigLine = macd.map(function(v){ return v !== null ? sig9[si++] : null; });

  var mn = macd[n-1], mp = macd[n-2];
  var sn = sigLine[n-1], sp = sigLine[n-2];
  var macdBullCross = mn!==null&&sn!==null&&mp!==null&&sp!==null && mp<=sp && mn>sn;
  var macdBearCross = mn!==null&&sn!==null&&mp!==null&&sp!==null && mp>=sp && mn<sn;
  var macdBull = mn!==null&&sn!==null && mn>sn;
  var macdBear = mn!==null&&sn!==null && mn<sn;

  var score   = 0;
  var reasons = [];

  /* SMA layer */
  if (goldenCross) {
    score += 2;
    reasons.push({label:'SMA', val:'🌟 Golden Cross', cls:'pos'});
  } else if (deathCross) {
    score -= 2;
    reasons.push({label:'SMA', val:'💀 Death Cross', cls:'neg'});
  } else if (sma200 && close > sma200) {
    score += 1;
    reasons.push({label:'SMA200', val:'Price above (' + sma200.toFixed(2) + ')', cls:'pos'});
  } else if (sma200 && close < sma200) {
    score -= 1;
    reasons.push({label:'SMA200', val:'Price below (' + sma200.toFixed(2) + ')', cls:'neg'});
  } else {
    reasons.push({label:'SMA200', val:'N/A', cls:'neu'});
  }

  /* MACD layer */
  if (macdBullCross) {
    score += 2;
    reasons.push({label:'MACD', val:'▲ Bull crossover', cls:'pos'});
  } else if (macdBearCross) {
    score -= 2;
    reasons.push({label:'MACD', val:'▼ Bear crossover', cls:'neg'});
  } else if (macdBull) {
    score += 1;
    reasons.push({label:'MACD', val:'Bullish', cls:'pos'});
  } else if (macdBear) {
    score -= 1;
    reasons.push({label:'MACD', val:'Bearish', cls:'neg'});
  } else {
    reasons.push({label:'MACD', val:'Neutral', cls:'neu'});
  }

  /* Fundamentals layer */
  if (eps !== null && eps > 0 && pe !== null && pe > 0 && pe < 400) {
    score += 1;
    reasons.push({label:'Fundamentals', val:'EPS +' + eps.toFixed(2) + ', PE ' + pe.toFixed(1) + 'x', cls:'pos'});
  } else if (eps !== null && eps < 0) {
    score -= 1;
    reasons.push({label:'Fundamentals', val:'EPS ' + eps.toFixed(2) + ' (loss)', cls:'neg'});
  } else if (pe !== null && pe >= 400) {
    score -= 1;
    reasons.push({label:'Fundamentals', val:'PE ' + pe.toFixed(0) + 'x (extreme)', cls:'neg'});
  } else {
    reasons.push({label:'Fundamentals', val:'No data', cls:'neu'});
  }

  /* SMA50 context */
  if (sma50 !== null && sma200 !== null) {
    reasons.push({label:'SMA 50/200', val: sma50.toFixed(2) + ' / ' + sma200.toFixed(2), cls: sma50>sma200?'pos':'neg'});
  }

  var signal = null;
  if (score >= 2)  signal = 'BUY';
  if (score <= -2) signal = 'SELL';
  if (signal === null && (score === 1 || score === -1)) signal = 'HOLD';

  return {signal: signal, reasons: reasons, score: score};
}

/* ─── SIGNAL LOADER ─── */
function loadSignal(ticker, eps, pe, cardId, idx) {
  var cached = sigCache[ticker];
  if (cached && (Date.now() - cached.ts) < 3600000) {
    applySignal(cardId, cached);
    return;
  }
  setTimeout(function(){
    fetchPrices(ticker).then(function(prices){
      var result = computeSignal(prices, eps, pe);
      result.ts  = Date.now();
      sigCache[ticker] = result;
      applySignal(cardId, result);
    });
  }, idx * 900);
}

function applySignal(cardId, result) {
  var badge  = document.getElementById('sig-'  + cardId);
  var detail = document.getElementById('det-'  + cardId);
  var card   = document.getElementById('card-' + cardId);
  if (!badge || !detail || !card) return;

  var sig     = result.signal  || null;
  var reasons = result.reasons || [];
  var score   = result.score   || 0;

  if (sig === 'BUY') {
    badge.className = 'sigbadge buy'; badge.textContent = '🟢 BUY';
    card.classList.add('sig-buy'); card.classList.remove('sig-sell');
  } else if (sig === 'SELL') {
    badge.className = 'sigbadge sell'; badge.textContent = '🔴 SELL';
    card.classList.add('sig-sell'); card.classList.remove('sig-buy');
  } else if (sig === 'HOLD') {
    badge.className = 'sigbadge hold'; badge.textContent = '⚪ HOLD';
    card.classList.remove('sig-buy','sig-sell');
  } else {
    badge.className = 'sigbadge hold'; badge.textContent = '— —';
    card.classList.remove('sig-buy','sig-sell');
  }

  if (reasons.length) {
    var scoreStr = (score >= 0 ? '+' : '') + score;
    var html = '<div class="sigdetail-title">Signal breakdown · score ' + scoreStr + '</div>';
    for (var i = 0; i < reasons.length; i++) {
      var r = reasons[i];
      html += '<div class="sigrow"><span class="sigrow-lbl">' + r.label + '</span><span class="sigrow-val ' + r.cls + '">' + r.val + '</span></div>';
    }
    detail.innerHTML = html;
    detail.classList.add('show');
  }
}

/* ─── HELPERS ─── */
function setDot(s){document.getElementById('dot').className='dot'+(s==='error'?' error':s==='loading'?' loading':'');}
function setUpdate(t){document.getElementById('lupdate').textContent=t||'';}
function fmtP(p){return '$'+Number(p).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtEPS(v){if(v===null)return{t:'N/A',c:'na'};return{t:(v>=0?'+':'')+v.toFixed(2),c:v>=0?'pos':'neg'};}
function fmtPE(v){if(v===null)return{t:'N/A',c:'na'};return{t:v.toFixed(2)+'x',c:''};}
function gnUrl(name,t){return 'https://news.google.com/search?q='+encodeURIComponent(name+' '+t+' stock')+'&hl=en-US&gl=US&ceid=US:en';}
function yfUrl(t){return 'https://finance.yahoo.com/quote/'+t+'/news/';}
function mwUrl(t){return 'https://www.marketwatch.com/investing/stock/'+t.toLowerCase()+'/news';}

function genSpark(ticker, price, chg, period) {
  var key = ticker + '|' + period.l;
  if (sparkCache[key]) return sparkCache[key];
  var pts = [], v = price / (1 + (chg||0)/100);
  for (var i = 0; i < period.n; i++) {
    v += (Math.random() - 0.48) * v * period.noise;
    pts.push(+v.toFixed(4));
  }
  pts.push(price);
  sparkCache[key] = pts;
  return pts;
}

/* ─── PERIOD BAR ─── */
function buildPbar() {
  var bar = document.getElementById('pbar');
  bar.innerHTML = '';
  PERIODS.forEach(function(p){
    var b = document.createElement('button');
    b.className = 'pbtn' + (p.l === curPeriod.l ? ' active' : '');
    b.textContent = p.l;
    b.onclick = function(){ curPeriod = p; sparkCache = {}; buildPbar(); renderPage(); };
    bar.appendChild(b);
  });
}

/* ─── UPDATE PANEL ─── */
function togglePanel(){
  var p = document.getElementById('upanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) document.getElementById('csv-ta').focus();
}
function applyCSV(){
  var raw = document.getElementById('csv-ta').value.trim();
  if (!raw) { showUMsg('Paste your CSV first.','err'); return; }
  var parsed = parseCSV(raw);
  if (!parsed.length) { showUMsg('Could not parse — check format.','err'); return; }
  stocks = parsed; sparkCache = {}; curPage = 0;
  try{ localStorage.setItem('wl_csv', raw); localStorage.setItem('wl_ts', new Date().toLocaleString()); }catch(e){}
  document.getElementById('csv-ta').value = '';
  document.getElementById('upanel').classList.remove('open');
  setUpdate('Updated just now · ' + parsed.length + ' stocks');
  renderPage();
  showUMsg('','');
}
function showUMsg(m,c){ var e=document.getElementById('umsg'); e.textContent=m; e.className='umsg '+c; }

/* ─── RENDER ─── */
function renderPage() {
  activeCharts.forEach(function(c){ try{c.destroy();}catch(e){} });
  activeCharts.length = 0;
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  var total = Math.max(1, Math.ceil(stocks.length / PER_PAGE));
  if (curPage >= total) curPage = Math.max(0, total - 1);
  document.getElementById('scount').textContent =
    stocks.length ? stocks.length + ' stocks · page ' + (curPage+1) + ' of ' + total : '';

  if (!stocks.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📈</div><h3>No stocks loaded</h3><p>Click ⬆ Update prices and paste your CSV</p></div>';
    buildPager(); return;
  }

  var slice = stocks.slice(curPage * PER_PAGE, curPage * PER_PAGE + PER_PAGE);
  slice.forEach(function(s, idx){
    var isUp  = s.changePct > 0, isDn = s.changePct < 0;
    var chgCls = isUp ? 'up' : isDn ? 'dn' : 'flat';
    var chgStr = s.changePct === 0 ? '0.00%' : (isUp?'+':'') + s.changePct.toFixed(2) + '%';
    var cid    = 'p' + curPage + 'i' + idx;
    var uid    = 'c' + s.ticker.replace(/[^A-Z0-9]/g,'') + cid;
    var gn     = gnUrl(s.name, s.ticker);
    var eps    = fmtEPS(s.eps);
    var pe     = fmtPE(s.pe);
    var cached = sigCache[s.ticker];

    /* Signal badge initial state */
    var sigHtml;
    if (cached) {
      var sig = cached.signal;
      if (sig === 'BUY')  sigHtml = '<span class="sigbadge buy"  id="sig-'+cid+'">🟢 BUY</span>';
      else if (sig==='SELL') sigHtml = '<span class="sigbadge sell" id="sig-'+cid+'">🔴 SELL</span>';
      else if (sig==='HOLD') sigHtml = '<span class="sigbadge hold" id="sig-'+cid+'">⚪ HOLD</span>';
      else sigHtml = '<span class="sigbadge hold" id="sig-'+cid+'">— —</span>';
    } else {
      sigHtml = '<span class="sigbadge loading" id="sig-'+cid+'">Loading…</span>';
    }

    var card = document.createElement('div');
    card.className = 'card' + (cached&&cached.signal==='BUY'?' sig-buy':cached&&cached.signal==='SELL'?' sig-sell':'');
    card.id = 'card-' + cid;
    card.innerHTML =
      '<div class="card-top">' +
        '<div class="card-top-left">' +
          '<div class="ticker">' + s.ticker + '</div>' +
          '<div class="coname" title="' + s.name + '">' + s.name + '</div>' +
        '</div>' +
        '<div class="card-top-right">' +
          '<span class="chgbadge ' + chgCls + '">' + chgStr + '</span>' +
          sigHtml +
        '</div>' +
      '</div>' +
      '<div class="price">' + fmtP(s.price) + '</div>' +
      '<div class="spark-wrap" id="sw-'+uid+'" title="Click for Google News">' +
        '<canvas id="' + uid + '"></canvas>' +
        '<div class="news-hint"><div class="news-hint-icon">↗</div><span>Google News</span></div>' +
        '<div class="tipbox" id="tip-'+uid+'">' +
          '<div class="tp" id="tp-'+uid+'"></div>' +
          '<div class="tl">trend (' + curPeriod.l + ')</div>' +
          '<div class="tr">Period move <span id="tpc-'+uid+'"></span></div>' +
          '<div class="tr">Day change <span style="color:' + (isUp?'var(--up)':isDn?'var(--dn)':'var(--muted)') + '">' + chgStr + '</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="sigdetail' + (cached&&cached.reasons&&cached.reasons.length?' show':'') + '" id="det-'+cid+'">' +
        (cached&&cached.reasons&&cached.reasons.length ?
          '<div class="sigdetail-title">Signal breakdown · score ' + (cached.score>=0?'+':'') + cached.score + '</div>' +
          cached.reasons.map(function(r){
            return '<div class="sigrow"><span class="sigrow-lbl">'+r.label+'</span><span class="sigrow-val '+r.cls+'">'+r.val+'</span></div>';
          }).join('') : '') +
      '</div>' +
      '<div class="nlinks">' +
        '<a class="nlbtn primary" href="'+gn+'" target="_blank" rel="noopener">📰 Google News</a>' +
        '<a class="nlbtn" href="'+yfUrl(s.ticker)+'" target="_blank" rel="noopener">Yahoo Finance</a>' +
        '<a class="nlbtn" href="'+mwUrl(s.ticker)+'" target="_blank" rel="noopener">MarketWatch</a>' +
      '</div>' +
      '<div class="stats">' +
        '<div class="stat"><div class="stat-lbl">EPS</div><div class="stat-val '+eps.c+'">'+eps.t+'</div></div>' +
        '<div class="stat"><div class="stat-lbl">P/E Ratio</div><div class="stat-val '+pe.c+'">'+pe.t+'</div></div>' +
      '</div>';
    grid.appendChild(card);

    /* Spark click → Google News */
    (function(url){ document.getElementById('sw-'+uid).addEventListener('click', function(){ window.open(url,'_blank','noopener'); }); })(gn);

    /* Draw sparkline */
    requestAnimationFrame(function(){
      var ctx = document.getElementById(uid); if (!ctx) return;
      var data   = genSpark(s.ticker, s.price, s.changePct, curPeriod);
      var tipEl  = document.getElementById('tip-'+uid);
      var tpEl   = document.getElementById('tp-'+uid);
      var tpcEl  = document.getElementById('tpc-'+uid);
      var color  = isUp ? '#34c77b' : isDn ? '#f0544f' : '#4f8ef7';
      var bgClr  = isUp ? 'rgba(52,199,123,0.08)' : isDn ? 'rgba(240,84,79,0.08)' : 'rgba(79,142,247,0.08)';
      var chart  = new Chart(ctx, {
        type:'line',
        data:{labels:data.map(function(_,i){return i;}),datasets:[{
          data:data, borderColor:color, borderWidth:1.5,
          pointRadius:0, pointHoverRadius:3, pointHoverBackgroundColor:color,
          fill:true, backgroundColor:bgClr, tension:0.35
        }]},
        options:{
          responsive:false, maintainAspectRatio:false, animation:false,
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{display:false},
            tooltip:{enabled:false, external:function(ctx2){
              var tooltip = ctx2.tooltip;
              if (tooltip.opacity === 0) { tipEl.style.display='none'; return; }
              var dp = tooltip.dataPoints && tooltip.dataPoints[0];
              if (!dp) return;
              var hv  = dp.raw;
              var pct = ((hv - data[0]) / data[0] * 100);
              var up  = pct >= 0;
              tpEl.textContent  = fmtP(hv);
              tpEl.style.color  = up ? '#34c77b' : '#f0544f';
              tpcEl.textContent = (up?'+':'') + pct.toFixed(2) + '%';
              tpcEl.style.color = up ? '#34c77b' : '#f0544f';
              tipEl.style.display = 'block';
            }}
          },
          scales:{x:{display:false},y:{display:false}}
        }
      });
      activeCharts.push(chart);
      ctx.addEventListener('mouseleave', function(){ tipEl.style.display='none'; });
    });

    /* Load signal staggered */
    loadSignal(s.ticker, s.eps, s.pe, cid, idx);
  });

  buildPager();
}

/* ─── PAGINATION ─── */
function buildPager() {
  var pg = document.getElementById('pager');
  pg.innerHTML = '';
  var total = Math.ceil(stocks.length / PER_PAGE);
  if (total <= 1) return;
  var prev = document.createElement('button');
  prev.className='pgbtn'; prev.textContent='← Prev'; prev.disabled = curPage===0;
  prev.onclick = function(){ curPage--; renderPage(); };
  pg.appendChild(prev);
  for (var i = 0; i < total; i++) {
    (function(idx){
      var b = document.createElement('button');
      b.className = 'pgbtn' + (idx===curPage?' cur':''); b.textContent = idx+1;
      b.onclick = function(){ curPage=idx; renderPage(); };
      pg.appendChild(b);
    })(i);
  }
  var next = document.createElement('button');
  next.className='pgbtn'; next.textContent='Next →'; next.disabled = curPage>=total-1;
  next.onclick = function(){ curPage++; renderPage(); };
  pg.appendChild(next);
  var info = document.createElement('span');
  info.className='pgcount';
  info.textContent = (curPage*PER_PAGE+1)+'–'+Math.min((curPage+1)*PER_PAGE,stocks.length)+' of '+stocks.length;
  pg.appendChild(info);
}

/* ─── AUTO REFRESH ─── */
function refresh() {
  setDot('loading');
  setUpdate('Refreshing…');
  fetchSheet().then(function(parsed){
    if (parsed && parsed.length) {
      stocks = parsed; sparkCache = {};
      setDot('ok');
      setUpdate('Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + ' · ' + parsed.length + ' stocks');
      renderPage();
    } else {
      setDot('error');
      setUpdate('Sheet unavailable — showing cached data');
    }
  });
}

/* ─── INIT ─── */
buildPbar();

/* Load from localStorage first for instant display */
try {
  var csv = localStorage.getItem('wl_csv');
  var ts  = localStorage.getItem('wl_ts');
  if (csv) {
    var p = parseCSV(csv);
    if (p.length) { stocks = p; setUpdate('Saved: ' + ts); renderPage(); }
  }
} catch(e){}

/* Then fetch live */
refresh();
setInterval(refresh, 30000);
</script>
